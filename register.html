        <nav><div class="wrap nav-inner"><a href="index.html" class="">首页</a>

    <section class="hero">
        <div class="wrap hero-grid">
            <div>
                <h1>用户注册</h1>
                <p>创建本地演示账号，体验会员功能。</p>
                <div class="pill-row">
                    <a class="btn gold" href="tea.html">浏览茶类</a>
                    <a class="btn secondary" href="search.html">站内搜索</a>
                </div>
            </div>
            <div class="hero-card"><div class="steam"></div></div>
        </div>
    </section>
    <main class="wrap">

        <section class="section-title"><small>REGISTER</small><h2>会员注册</h2></section>
        <div class="card">
            <form class="form" id="registerForm">
                <label>用户名</label><input name="username" required minlength="2" placeholder="请输入用户名">
                <label>手机号</label><input name="phone" required placeholder="请输入手机号">
                <label>密码</label><input name="password" type="password" required minlength="6" placeholder="至少 6 位">
                <button class="btn" type="submit">注册并登录</button>
                <div class="notice" id="registerNotice"></div>
            </form>
        </div>

    </main>
